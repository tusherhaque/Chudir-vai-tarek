<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title><style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.2);
    width:320px;
}

h1{
    color:#ff4d6d;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    margin:10px;
}

.yes{
    background:#28a745;
    color:white;
}

.no{
    background:#dc3545;
    color:white;
    position:relative;
}

#result{
    margin-top:20px;
    font-size:22px;
    color:#ff4d6d;
    font-weight:bold;
}
</style></head><body><div class="box">
    <h1>Hey, Chudir vai tarek</h1><p>
   Chudir vai tarek
</p>

<h2>PiR vokto:" 💖</h2>

<button class="btn yes" onclick="accepted()">Yes 😍</button>
<button class="btn no" id="noBtn">No 😅</button>

<div id="result"></div>

</div><script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * 80 + "%";
    noBtn.style.top = Math.random() * 80 + "%";
});

function accepted(){
    document.getElementById("result").innerHTML =
    "Yayyy! Ami pir Vokto 🥰";
}
</script></body>
</html>
